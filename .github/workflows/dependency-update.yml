name: Dependency Management

on:
  schedule:
    # Run every Monday at 10:00 UTC (after dependabot runs)
    - cron: '0 10 * * 1'
  workflow_dispatch: # Allow manual trigger
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Check for outdated dependencies
        id: outdated
        run: |
          echo "## Outdated Dependencies Report" > outdated.md
          echo "" >> outdated.md
          echo "Checking for outdated Go modules..." >> outdated.md
          echo "" >> outdated.md
          
          # Get list of all dependencies
          go list -u -m -json all | jq -r 'select(.Update) | "- **\(.Path)**: \(.Version) → \(.Update.Version)"' >> outdated.md || echo "All dependencies are up to date!" >> outdated.md
          
          cat outdated.md
          
          # Save for artifact
          echo "OUTDATED_COUNT=$(go list -u -m -json all | jq -s '[.[] | select(.Update)] | length')" >> $GITHUB_OUTPUT

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-dependencies
          path: outdated.md
          retention-days: 30

      - name: Comment on PR if outdated
        if: github.event_name == 'pull_request' && steps.outdated.outputs.OUTDATED_COUNT != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('outdated.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  generate-changelog:
    name: Generate Dependency Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Generate changelog for dependency updates
        id: changelog
        run: |
          echo "## Dependency Update Changelog" > changelog.md
          echo "" >> changelog.md
          echo "**PR**: #${{ github.event.pull_request.number }}" >> changelog.md
          echo "**Branch**: ${{ github.event.pull_request.head.ref }}" >> changelog.md
          echo "" >> changelog.md
          
          # Get the base branch
          git fetch origin ${{ github.event.pull_request.base.ref }}
          
          # Compare go.mod files
          echo "### Changes to go.mod:" >> changelog.md
          git diff origin/${{ github.event.pull_request.base.ref }} HEAD -- go.mod | grep "^[+-]" | grep -v "^[+-][+-][+-]" >> changelog.md || echo "No changes detected" >> changelog.md
          echo "" >> changelog.md
          
          # List updated modules with versions
          echo "### Updated Modules:" >> changelog.md
          go mod download
          go list -m -json all | jq -r '"- \(.Path)@\(.Version)"' >> changelog.md
          
          cat changelog.md

      - name: Comment changelog on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('changelog.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: changelog
            });

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: dependency-changelog
          path: changelog.md
          retention-days: 90

  auto-merge-minor-patch:
    name: Auto-merge Minor/Patch Updates
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify tests pass
        run: |
          go mod download
          go mod verify
          go test ./... -v

      - name: Check if minor or patch update
        id: check-update
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          # Check if it's a minor or patch update (not major)
          if echo "$PR_TITLE" | grep -qE "Bump .* from [0-9]+\.[0-9]+\.[0-9]+ to [0-9]+\.[0-9]+\.[0-9]+"; then
            # Extract versions
            OLD_VERSION=$(echo "$PR_TITLE" | sed -n 's/.*from \([0-9.]*\).*/\1/p')
            NEW_VERSION=$(echo "$PR_TITLE" | sed -n 's/.*to \([0-9.]*\).*/\1/p')
            
            OLD_MAJOR=$(echo "$OLD_VERSION" | cut -d. -f1)
            NEW_MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
            
            if [ "$OLD_MAJOR" = "$NEW_MAJOR" ]; then
              echo "IS_MINOR_OR_PATCH=true" >> $GITHUB_OUTPUT
              echo "Update is minor or patch - safe to auto-merge"
            else
              echo "IS_MINOR_OR_PATCH=false" >> $GITHUB_OUTPUT
              echo "Update is major - manual review required"
            fi
          else
            echo "IS_MINOR_OR_PATCH=false" >> $GITHUB_OUTPUT
            echo "Could not determine update type - manual review required"
          fi

      - name: Auto-approve PR
        if: steps.check-update.outputs.IS_MINOR_OR_PATCH == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ Auto-approved: Minor/patch dependency update passed all tests.'
            });

      - name: Enable auto-merge
        if: steps.check-update.outputs.IS_MINOR_OR_PATCH == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Enable auto-merge with squash
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash',
              commit_title: `${{ github.event.pull_request.title }}`,
              commit_message: 'Auto-merged by dependency management workflow'
            });

      - name: Add comment for major updates
        if: steps.check-update.outputs.IS_MINOR_OR_PATCH == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ This appears to be a major version update. Manual review is required before merging.'
            });

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run go mod verify
        run: go mod verify

      - name: Check for known vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Generate security report
        if: always()
        run: |
          echo "## Security Audit Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date**: $(date -u)" >> security-report.md
          echo "**Repository**: ${{ github.repository }}" >> security-report.md
          echo "" >> security-report.md
          echo "### Vulnerability Scan Results" >> security-report.md
          govulncheck -json ./... | jq -r '.message' >> security-report.md 2>&1 || echo "No vulnerabilities found" >> security-report.md

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: security-report.md
          retention-days: 90
